<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <div aria-label="Modo Escuro" id="switchOut">
            <input id="switchToggle" type="checkbox" name="switchToggle">
            <span id="switchIn">
                <p><i class="fa-solid fa-sun"></i></p>
            </span>
        </div>
        <h1>Lista de Tarefas</h1>
    </header>
    <main>
        <input type="text" placeholder="Escreva uma tarefa" name="inputTask" id="inputTask">
        <button id="addTask">Adicionar</button>
        <table id="lista">

        </table>
    </main>
    <script src="https://kit.fontawesome.com/55cafb9f96.js" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>
</html>
